  <!--
    FW13 · FOUC 防护 + 主题初始化
    MUST 是 <head> 首个可执行节点（早于 <link rel="stylesheet">）
    读取顺序：localStorage → prefers-color-scheme → 默认 light
  -->
  <script>
    (function () {
      try {
        var LS_KEY = 'charming-ancestors-progress-v1';
        var state = null;
        try { state = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
        var theme = state && state.theme;
        var lang = state && state.lang;

        // 主题：localStorage → system/prefers → light
        var applied;
        if (theme === 'light' || theme === 'dark') {
          applied = theme;
        } else {
          var mql = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
          applied = (mql && mql.matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', applied);
        document.documentElement.setAttribute('data-theme-pref', theme || 'system');

        // 语言：localStorage → navigator.language → zh
        var applyLang;
        if (lang === 'zh' || lang === 'en') {
          applyLang = lang;
        } else {
          applyLang = (navigator.language || 'zh').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en';
        }
        document.documentElement.setAttribute('lang', applyLang);
      } catch (e) {
        // 失败则用 HTML 默认 attr（light + zh）
      }
    })();
  </script>
